name: Publish to NPM

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  publish:
    if: ${{ github.event.pull_request.merged == true }}
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          corepack enable
          corepack install
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: |
          yarn install --frozen-lockfile
          yarn build

      - run: yarn nx release publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
