name: Node.js CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  ci:
    name: Run linting, unit tests, and validate build for Node.js
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: fetch main branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin main:main

      - name: set SHAs for NX affected command
        uses: nrwl/nx-set-shas@v4

      - name: setup corepack and install yarn
        run: |
          corepack enable
          corepack install

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: install Node.js dependencies
        run: yarn install

      - name: lint, test, build
        run: yarn nx affected -t lint test build
