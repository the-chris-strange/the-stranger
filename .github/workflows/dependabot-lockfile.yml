name: Update lockfile for dependabot updates

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  update-lockfile:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
        with:
          skip-verification: true

      - name: Checkout pull request branch
        if: steps.dependabot-metadata.outputs.package-ecosystem == 'npm'
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Enable Corepack
        if: steps.dependabot-metadata.outputs.package-ecosystem == 'npm'
        run: corepack enable && corepack install

      - name: Set up Node.js
        if: steps.dependabot-metadata.outputs.package-ecosystem == 'npm'
        uses: actions/setup-node@v5
        with:
          cache: yarn
          node-version: 24

      - name: Update lockfile
        if: steps.dependabot-metadata.outputs.package-ecosystem == 'npm'
        run: yarn install

      - name: Commit lockfile
        if: steps.dependabot-metadata.outputs.package-ecosystem == 'npm'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yarn.lock

          if git diff --cached --quiet; then
            echo "No yarn.lock changes to commit."
            exit 0
          fi

          git commit -m "chore: update yarn.lock"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
