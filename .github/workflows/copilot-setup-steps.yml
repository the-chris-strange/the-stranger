name: Copilot Setup

on:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_CI }}

jobs:
  # required name
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: nrwl/nx-set-shas@v4
      - run: corepack enable && corepack install
      - uses: actions/setup-node@v5
        with:
          cache: yarn
          node-version: 24
      - name: install Node.js dependencies
        run: yarn
